# ════════════════════════════════════════════════════════════════════════════
# Wasteland — Main Configuration
# ════════════════════════════════════════════════════════════════════════════

storage:
  type: YAML
  mysql:
    host: "localhost"
    port: 3306
    database: "wasteland"
    username: "root"
    password: "password"
    pool-size: 10
    connection-timeout: 30000
    idle-timeout: 600000
    max-lifetime: 1800000

worlds:
  mining:
    enabled: true
    world: "wasteland_mining"
  woodcutting:
    enabled: true
    world: "wasteland_woodcutting"
  farming:
    enabled: true
    world: "wasteland_farming"
  fishing:
    enabled: true
    world: "wasteland_fishing"

# ── Wasteland Worlds ─────────────────────────────────────────────────────────
# Players only accumulate Wasteland Playtime while inside one of these worlds.
# Time spent in spawn, hub, survival, or any other world does NOT count.
# If this list is empty, the plugin falls back to all worlds configured in the
# 'worlds' section above.
wasteland-worlds:
  - wasteland_mining
  - wasteland_woodcutting
  - wasteland_farming
  - wasteland_fishing

# ── Playtime Tracking ────────────────────────────────────────────────────────
# Tracks total time players spend in the Wasteland system.
# Format tokens: {days}, {hours}, {minutes}, {seconds}, {total_hours}
# strip-empty-parts removes leading "0d", "0h", etc. for compact display.
playtime:
  format: "{days}d {hours}h {minutes}m"
  strip-empty-parts: true

# ── Tier-Locked Ores (Mining World) ──────────────────────────────────────────
# In the mining world, certain ores require the player to have reached a
# specific shared tier before they can be broken. If a player tries to break
# an ore without the required tier, the break is cancelled and a configurable
# message is sent.
#
# The tier here is the SHARED tier (unlocked when all 4 skills reach the
# required level), NOT the per-skill Mining level.
#
# Material names must match Bukkit 1.8 Material enum values.
# Remove an entry or set its tier to 0 to disable the lock for that ore.
tier-locked-ores:
  COAL_ORE: 1
  IRON_ORE: 2
  GOLD_ORE: 3
  EMERALD_ORE: 4
  DIAMOND_ORE: 5

debug: false
