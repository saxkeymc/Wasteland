# ════════════════════════════════════════════════════════════════════════════
# Wasteland — Skill Teleport Destinations
# ════════════════════════════════════════════════════════════════════════════
# These locations are set in-game via:
#   /wasteland setteleportmining
#   /wasteland setteleportchopping
#   /wasteland setteleportfarming
#   /wasteland setteleportfishing
#
# You normally do NOT need to edit this file by hand — the commands above
# will populate it automatically. It is, however, safe to edit while the
# server is stopped, and /wasteland reload will pick up changes.
#
# Format:
# teleports:
#   <skill>:
#     world: "world"
#     x: 0.5
#     y: 64.0
#     z: 0.5
#     yaw: 0.0
#     pitch: 0.0
# ════════════════════════════════════════════════════════════════════════════

teleports: {}
