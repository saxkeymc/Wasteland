# ════════════════════════════════════════════════════════════════════════════
# Wasteland — Tier & Reward Configuration (SHARED TIER SYSTEM)
# ════════════════════════════════════════════════════════════════════════════
# There is only ONE shared tier progression per player. Every skill
# contributes toward unlocking the same tiers. There are no per-skill
# tiers. Each tier contains a single shared reward pool.
#
# Tier unlock is based on the player's TOTAL level across all skills.
#
# Tier entry:
#   required-level  — total level required to unlock this tier.
#   display-name    — coloured name shown in the tier browser GUI.
#   glass-color     — Material used for the tier glass pane.
#   glass-data      — Data/durability value (stained-glass colour).
#   rewards         — single shared pool of rewards for this tier.
#
# Reward entry format:
#   <reward_id>:
#     chance: 100                # Probability (0-100) of being awarded when claimed.
#     display-item:              # What the GUI shows. Commands are NEVER shown.
#       material: CHEST
#       data: 0
#       name: "&fTier Reward"
#       lore:
#         - "&7A reward."
#     commands:                  # Hidden console commands executed on success.
#       - "eco give %player% 1000"
# ════════════════════════════════════════════════════════════════════════════

tiers:
  1:
    required-level: 0
    display-name: "&aTier 1"
    glass-color: STAINED_GLASS_PANE
    glass-data: 5
    rewards:
      reward_1:
        chance: 100
        display-item:
          material: CHEST
          data: 0
          name: "&fTier 1 Reward"
          lore:
            - "&7A starter reward."
            - "&7Contains a small economy bonus."
