# ════════════════════════════════════════════════════════════════════════════
# Wasteland — Main Configuration
# ════════════════════════════════════════════════════════════════════════════

storage:
  type: YAML
  mysql:
    host: "localhost"
    port: 3306
    database: "wasteland"
    username: "root"
    password: "password"
    pool-size: 10
    connection-timeout: 30000
    idle-timeout: 600000
    max-lifetime: 1800000

worlds:
  mining:
    enabled: true
    world: "wasteland_mining"
  woodcutting:
    enabled: true
    world: "wasteland_woodcutting"
  farming:
    enabled: true
    world: "wasteland_farming"
  fishing:
    enabled: true
    world: "wasteland_fishing"

# ── Wasteland Worlds ─────────────────────────────────────────────────────────
# Players only accumulate Wasteland Playtime while inside one of these worlds.
# Time spent in spawn, hub, survival, or any other world does NOT count.
# If this list is empty, the plugin falls back to all worlds configured in the
# 'worlds' section above.
wasteland-worlds:
  - wasteland_mining
  - wasteland_woodcutting
  - wasteland_farming
  - wasteland_fishing

# ── Playtime Tracking ────────────────────────────────────────────────────────
# Tracks total time players spend in the Wasteland system.
# Format tokens: {days}, {hours}, {minutes}, {seconds}, {total_hours}
# strip-empty-parts removes leading "0d", "0h", etc. for compact display.
playtime:
  format: "{days}d {hours}h {minutes}m"
  strip-empty-parts: true

# ── Tier-Locked Blocks (All Worlds) ──────────────────────────────────────────
# In each skill's world, certain blocks require the player to have reached
# a specific shared tier before they can be broken. If a player tries to
# break a locked block without the required tier, the break is cancelled
# and a configurable message is sent (the block stays as-is, no bedrock).
#
# If the player HAS the tier, the break is cancelled, the block turns to
# BEDROCK, the player gets XP + drops manually, and the block regenerates
# after 6 seconds.
#
# The tier here is the SHARED tier (unlocked when all 4 skills reach the
# required level), NOT the per-skill level.
#
# Material names must match Bukkit 1.8 Material enum values.
# Remove an entry or set its tier to 0 to disable the lock for that block.
tier-locked-blocks:
  # Mining world — ores
  mining:
    COAL_ORE: 1
    IRON_ORE: 2
    GOLD_ORE: 3
    EMERALD_ORE: 4
    DIAMOND_ORE: 5
  # Woodcutting world — logs (example: higher-tier logs require higher tier)
  woodcutting: {}
  # Farming world — crops (example: nether wart requires tier 2)
  farming: {}
  # Fishing world — (no blocks to lock, but kept for consistency)
  fishing: {}

debug: false
