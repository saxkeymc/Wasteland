storage:
  type: YAML
  mysql:
    host: "localhost"
    port: 3306
    database: "wasteland"
    username: "root"
    password: "password"
    pool-size: 10
    connection-timeout: 30000
    idle-timeout: 600000
    max-lifetime: 1800000

worlds:
  mining:
    enabled: true
    world: "wasteland"
  woodcutting:
    enabled: true
    world: "wasteland"
  farming:
    enabled: true
    world: "wasteland"
  fishing:
    enabled: true
    world: "wasteland"

wasteland-worlds:
  - wasteland

playtime:
  format: "{days}d {hours}h {minutes}m"
  strip-empty-parts: true

tier-locked-blocks:
  mining:
    COAL_ORE: 1
    IRON_ORE: 2
    GOLD_ORE: 3
    EMERALD_ORE: 4
    DIAMOND_ORE: 5
  woodcutting: {}
  farming: {}
  fishing: {}

mining-money-drops:
  enabled: true
  chance: 5.0          # % chance per block break (0-100)
  min-amount: 5000     # Minimum money to give
  max-amount: 7000     # Maximum money to give
  command: "eco give %player% {amount}"
  message: "{prefix}&aYou found &2${amount} &awhile mining!"

debug: false

start-date:
  timestamp: 0
