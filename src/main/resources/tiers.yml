# ════════════════════════════════════════════════════════════════════════════
# Wasteland — Tier & Reward Configuration (SHARED TIER SYSTEM, v1.4)
# ════════════════════════════════════════════════════════════════════════════
# There is only ONE shared tier progression per player. To unlock the next
# tier, EVERY skill (Mining, Chopping, Farming, Fishing) must reach the
# tier's required level. Rushing a single skill will NOT unlock the next
# tier — players are encouraged to level all four skills equally.
#
# Tier entry:
#   required-level  — level that EVERY skill must reach to unlock this tier.
#   display-name    — coloured name shown in the tier browser GUI.
#   glass-color     — Material used for the tier glass pane.
#   glass-data      — Data/durability value (stained-glass colour).
#   rewards         — single shared pool of rewards for this tier.
#
# Reward entry format:
#   <reward_id>:
#     chance: 100                # Probability (0-100) of being awarded when claimed.
#     display-item:              # What the GUI shows. Commands are NEVER shown.
#       material: CHEST
#       data: 0
#       name: "&fTier Reward"
#       lore:
#         - "&7A reward."
#     commands:                  # Hidden console commands executed on success.
#       - "eco give %player% 1000"
# ════════════════════════════════════════════════════════════════════════════

tiers:
  1:
    required-level: 10
    display-name: "&aTier 1"
    glass-color: STAINED_GLASS_PANE
    glass-data: 5
    rewards:
      reward_1:
        chance: 100
        display-item:
          material: CHEST
          data: 0
          name: "&fTier 1 Reward"
          lore:
            - "&7A starter reward."
            - "&7Contains a small economy bonus."
        commands:
          - "eco give %player% 1000"

  2:
    required-level: 20
    display-name: "&eTier 2"
    glass-color: STAINED_GLASS_PANE
    glass-data: 4
    rewards:
      reward_1:
        chance: 100
        display-item:
          material: TRIPWIRE_HOOK
          data: 0
          name: "&eRare Crate Key"
          lore:
            - "&7A shiny key that opens"
            - "&7a rare treasure crate."
        commands:
          - "crate key give %player% Rare 1"

  3:
    required-level: 30
    display-name: "&6Tier 3"
    glass-color: STAINED_GLASS_PANE
    glass-data: 1
    rewards:
      reward_1:
        chance: 100
        display-item:
          material: GOLD_INGOT
          data: 0
          name: "&610000 Coins"
          lore:
            - "&7A hefty sum of money"
            - "&7to fund your adventures."
        commands:
          - "eco give %player% 10000"

  4:
    # Note: same required level as Tier 3 per spec. Edit if you want a higher value.
    required-level: 30
    display-name: "&dTier 4"
    glass-color: STAINED_GLASS_PANE
    glass-data: 10
    rewards:
      reward_1:
        chance: 100
        display-item:
          material: PAPER
          data: 0
          name: "&dRank Voucher"
          lore:
            - "&7Redeem for a special"
            - "&7server rank upgrade."
        commands:
          - "voucher give %player% Rank"
      reward_2:
        chance: 50
        display-item:
          material: TRIPWIRE_HOOK
          data: 0
          name: "&eEpic Crate Key"
          lore:
            - "&7An epic key that opens"
            - "&7an epic treasure crate."
        commands:
          - "crate key give %player% Epic 1"

  5:
    required-level: 40
    display-name: "&cTier 5"
    glass-color: STAINED_GLASS_PANE
    glass-data: 14
    rewards:
      reward_1:
        chance: 50
        display-item:
          material: DIAMOND
          data: 0
          name: "&bLegendary Crate Key"
          lore:
            - "&7A radiant key that opens"
            - "&7a legendary treasure crate."
        commands:
          - "crate key give %player% Legendary 3"
      reward_2:
        chance: 10
        display-item:
          material: NETHER_STAR
          data: 0
          name: "&6\u2605 Bonus Reward"
          lore:
            - "&7A rare bonus reward"
            - "&7for the most dedicated players."
        commands:
          - "eco give %player% 25000"
