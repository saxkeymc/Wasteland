# ════════════════════════════════════════════════════════════════════════════
# Wasteland — Tools Configuration
# ════════════════════════════════════════════════════════════════════════════
# Omni tools are given automatically when entering a Wasteland world.
# They are removed when leaving. All enchants are HIDDEN (ItemFlag.HIDE_ENCHANTS).
# Lore uses themed quotes for each skill — no level/XP display.
# ════════════════════════════════════════════════════════════════════════════

tools:
  mining:
    material: DIAMOND_PICKAXE
    name: "&7&lMining Pickaxe"
    lore:
      - "&7&o\"The deepest caves hide the greatest treasures,"
      - "&7&obut only the brave dare to descend.\""
      - ""
      - "  &8— Unknown Miner"
      - ""
      - "&8&oWasteland Omni Tool"
    enchants:
      DURABILITY: 10
      DIG_SPEED: 5
      LOOT_BONUS_BLOCKS: 3
    glow: false
    hide-flags: true
    custom-model-data: -1
    nbt-key: "wasteland_tool"
    nbt-value: "mining"

  woodcutting:
    material: DIAMOND_AXE
    name: "&6&lChopping Axe"
    lore:
      - "&7&o\"A sharp axe and a steady hand"
      - "&7&ocan fell the mightiest of trees.\""
      - ""
      - "  &8— Forest Wanderer"
      - ""
      - "&8&oWasteland Omni Tool"
    enchants:
      DURABILITY: 10
      DIG_SPEED: 5
      LOOT_BONUS_BLOCKS: 3
    glow: false
    hide-flags: true
    custom-model-data: -1
    nbt-key: "wasteland_tool"
    nbt-value: "woodcutting"

  farming:
    material: DIAMOND_HOE
    name: "&a&lFarming Hoe"
    lore:
      - "&7&o\"From a single seed, an empire grows."
      - "&7&oPatience is the farmer's greatest tool.\""
      - ""
      - "  &8— Old Farmer's Proverb"
      - ""
      - "&8&oWasteland Omni Tool"
    enchants:
      DURABILITY: 10
      LOOT_BONUS_BLOCKS: 3
    glow: false
    hide-flags: true
    custom-model-data: -1
    nbt-key: "wasteland_tool"
    nbt-value: "farming"

  fishing:
    material: FISHING_ROD
    name: "&b&lFishing Rod"
    lore:
      - "&7&o\"The waters are full of hidden rewards."
      - "&7&oCast your line and let fate decide.\""
      - ""
      - "  &8— Legendary Angler"
      - ""
      - "&8&oWasteland Omni Tool"
    enchants:
      DURABILITY: 10
      LUCK: 3
      LURE: 3
    glow: false
    hide-flags: true
    custom-model-data: -1
    nbt-key: "wasteland_tool"
    nbt-value: "fishing"
