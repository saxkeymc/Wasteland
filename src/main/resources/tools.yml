# ════════════════════════════════════════════════════════════════════════════
# Wasteland — Tools Configuration
# ════════════════════════════════════════════════════════════════════════════
# Omni tools are given automatically when entering a Wasteland world.
# They are removed when leaving. All enchants are HIDDEN.
# Lore uses quotes from real historical figures.
# ════════════════════════════════════════════════════════════════════════════

tools:
  mining:
    material: DIAMOND_PICKAXE
    name: "&7&lMining Pickaxe"
    lore:
      - "&7&o\"A mine is a hole in the ground"
      - "&7&owith a liar standing beside it.\""
      - ""
      - "&7- Mark Twain"
    enchants:
      DURABILITY: 10
      DIG_SPEED: 5
      LOOT_BONUS_BLOCKS: 3
    glow: false
    hide-flags: true
    custom-model-data: -1
    nbt-key: "wasteland_tool"
    nbt-value: "mining"

  woodcutting:
    material: DIAMOND_AXE
    name: "&6&lChopping Axe"
    lore:
      - "&7&o\"He who plants a tree"
      - "&7&oplants a hope.\""
      - ""
      - "&7- Lucy Larcom"
    enchants:
      DURABILITY: 10
      DIG_SPEED: 5
      LOOT_BONUS_BLOCKS: 3
    glow: false
    hide-flags: true
    custom-model-data: -1
    nbt-key: "wasteland_tool"
    nbt-value: "woodcutting"

  farming:
    material: DIAMOND_HOE
    name: "&a&lFarming Hoe"
    lore:
      - "&7&o\"Farming looks mighty easy when"
      - "&7&oyour plow is a pencil, and"
      - "&7&oyou're a thousand miles from"
      - "&7&othe corn field.\""
      - ""
      - "&7- Dwight D. Eisenhower"
    enchants:
      DURABILITY: 10
      LOOT_BONUS_BLOCKS: 3
    glow: false
    hide-flags: true
    custom-model-data: -1
    nbt-key: "wasteland_tool"
    nbt-value: "farming"

  fishing:
    material: FISHING_ROD
    name: "&b&lFishing Rod"
    lore:
      - "&7&o\"Many men go fishing all of"
      - "&7&otheir lives without knowing"
      - "&7&othat it is not fish they"
      - "&7&oare after.\""
      - ""
      - "&7- Henry David Thoreau"
    enchants:
      DURABILITY: 10
      LUCK: 3
      LURE: 3
    glow: false
    hide-flags: true
    custom-model-data: -1
    nbt-key: "wasteland_tool"
    nbt-value: "fishing"
