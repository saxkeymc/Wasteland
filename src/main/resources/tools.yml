# ════════════════════════════════════════════════════════════════════════════
# Wasteland — Tools Configuration
# ════════════════════════════════════════════════════════════════════════════
# Omni tools are given automatically when entering a Wasteland world.
# They are removed when leaving. All enchants are HIDDEN.
# Lore uses quotes from real historical miners/fishers/farmers/lumberjacks.
# ════════════════════════════════════════════════════════════════════════════

tools:
  mining:
    material: DIAMOND_PICKAXE
    name: "&7&lMining Pickaxe"
    lore:
      - "&7&o\"A mine is a hole in the ground"
      - "&7&owith a liar standing beside it.\""
      - ""
      - "  &8— Mark Twain"
    enchants:
      DURABILITY: 10
      DIG_SPEED: 5
      LOOT_BONUS_BLOCKS: 3
    glow: false
    hide-flags: true
    custom-model-data: -1
    nbt-key: "wasteland_tool"
    nbt-value: "mining"

  woodcutting:
    material: DIAMOND_AXE
    name: "&6&lChopping Axe"
    lore:
      - "&7&o\"He who plants a tree"
      - "&7&oplants a hope.\""
      - ""
      - "  &8— Lucy Larcom"
    enchants:
      DURABILITY: 10
      DIG_SPEED: 5
      LOOT_BONUS_BLOCKS: 3
    glow: false
    hide-flags: true
    custom-model-data: -1
    nbt-key: "wasteland_tool"
    nbt-value: "woodcutting"

  farming:
    material: DIAMOND_HOE
    name: "&a&lFarming Hoe"
    lore:
      - "&7&o\"Farming looks mighty easy when your plow"
      - "&7&ois a pencil, and you're a thousand miles"
      - "&7&ofrom the corn field.\""
      - ""
      - "  &8— Dwight D. Eisenhower"
    enchants:
      DURABILITY: 10
      LOOT_BONUS_BLOCKS: 3
    glow: false
    hide-flags: true
    custom-model-data: -1
    nbt-key: "wasteland_tool"
    nbt-value: "farming"

  fishing:
    material: FISHING_ROD
    name: "&b&lFishing Rod"
    lore:
      - "&7&o\"Many men go fishing all of their lives"
      - "&7&owithout knowing that it is not fish"
      - "&7&othey are after.\""
      - ""
      - "  &8— Henry David Thoreau"
    enchants:
      DURABILITY: 10
      LUCK: 3
      LURE: 3
    glow: false
    hide-flags: true
    custom-model-data: -1
    nbt-key: "wasteland_tool"
    nbt-value: "fishing"
